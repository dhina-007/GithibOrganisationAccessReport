spring:
  application:
    name: github-access-report
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

github:
  base-url: https://api.github.com
  token: ${GITHUB_TOKEN:}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000
  max-concurrent-requests: ${GITHUB_MAX_CONCURRENT_REQUESTS:15}
  per-page: 100
  retry:
    max-attempts: 3
    initial-delay-ms: 500
    multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.githubaccess.report: INFO
