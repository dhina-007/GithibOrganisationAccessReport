# Honor X-Forwarded-* from reverse proxies (HTTPS termination, public host)
server:
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    com.githubaccess.report: INFO

management:
  endpoint:
    health:
      show-details: never

# Prefer explicit frontend origins in production when calling the API from another domain.
# Example: CORS_ALLOWED_ORIGINS=https://app.example.com,https://admin.example.com
# Leave as "*" (default) when only using Swagger on the same host.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
